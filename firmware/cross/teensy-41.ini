[binaries]
c = 'arm-none-eabi-gcc'
cpp = 'arm-none-eabi-g++'
ar = 'arm-none-eabi-ar'
strip = 'arm-none-eabi-strip'
objcopy = 'arm-none-eabi-objcopy'
objdump = 'arm-none-eabi-objdump'
size = 'arm-none-eabi-size'

[host_machine]
system = 'none'
cpu_family = 'arm'
cpu = 'cortex-m7'
endian = 'little'

[built-in options]
c_args = [ '-mthumb', '-mcpu=cortex-m7', '-mfpu=fpv5-d16', '-mfloat-abi=hard', '-D__IMXRT1062__', '-DARDUINO=10813', '-DTEENSYDUINO=159', '-DARDUINO_TEENSY41', '-DF_CPU=600000000', '-DUSB_SERIAL', '-DLAYOUT_US_ENGLISH', '-DUSING_MAKEFILE', '-fno-pic']
cpp_args = c_args + [ '-std=gnu++17', '-felide-constructors', '-fno-exceptions', '-fno-rtti', '-fpermissive', '-Wno-error=narrowing' ]

c_link_args = [ '-mthumb', '-mcpu=cortex-m7', '-mfpu=fpv5-d16', '-mfloat-abi=hard', '-T../cross/teensy-41.ld', '-Wl,--gc-sections,--relax', '-Os', '-specs=nano.specs', '-Wl,--undefined=__flashconfig', '-Wl,--undefined=__image_vector_table']
cpp_link_args = c_link_args
